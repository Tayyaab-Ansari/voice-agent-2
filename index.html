<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Fifth Avenue — Ali</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e63946;
      --dark: #0d0d0d;
      --card: #141414;
      --gold: #f4a11d;
      --text: #f0ece4;
      --muted: #6b6560;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(230,57,70,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(244,161,29,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 40px 32px 36px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .badge {
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--text);
      line-height: 1;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .logo span { color: var(--red); }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      border: 2px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    .online-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid var(--card);
    }

    .online-dot.calling {
      background: var(--gold);
      animation: blink 0.8s infinite;
    }

    .online-dot.active {
      background: var(--red);
      animation: blink 0.6s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .agent-name {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .agent-role {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .waves {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      margin-bottom: 32px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .waves.visible { opacity: 1; }

    .wave-bar {
      width: 3px;
      border-radius: 3px;
      background: var(--red);
      animation: wave 1s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { animation-delay: 0.3s; }
    .wave-bar:nth-child(7) { animation-delay: 0.2s; }
    .wave-bar:nth-child(8) { animation-delay: 0.1s; }
    .wave-bar:nth-child(9) { animation-delay: 0s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 28px; }
    }

    .talk-btn {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: none;
      background: var(--red);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    .talk-btn:hover { background: #cf2f3b; transform: translateY(-1px); }
    .talk-btn:active { transform: scale(0.98); }

    .talk-btn.calling {
      background: var(--gold);
      color: #1a0f00;
    }

    .talk-btn.active {
      background: #1e1e1e;
      border: 1.5px solid var(--red);
      color: var(--red);
    }

    .talk-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .icon { font-size: 18px; }

    .status-text {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: color 0.3s;
    }

    .status-text.live { color: var(--red); }

    .divider {
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.06);
      margin: 24px 0 20px;
    }

    .menu-preview {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .menu-chip {
      background: #1a1a1a;
      border: 0.5px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      color: #8a8480;
    }

    .menu-chip strong {
      display: block;
      color: #c0bbb4;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 1px;
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #3a3835;
      text-align: center;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="card">
  <div class="badge">Pakistani Fast Food</div>
  <div class="logo">Fifth<span>Ave</span></div>
  <div class="tagline">Islamabad's Finest</div>

  <div class="avatar-wrap">
    <div class="avatar">👨‍🍳</div>
    <div class="online-dot" id="dot"></div>
  </div>

  <div class="agent-name">Ali</div>
  <div class="agent-role">Voice Receptionist</div>

  <div class="waves" id="waves">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <button class="talk-btn" id="talkBtn" onclick="toggleCall()">
    <span class="icon">📞</span>
    <span id="btnLabel">Ali se baat karein</span>
  </button>

  <div class="status-text" id="statusText">Online — Order lene ke liye tayyar hai</div>

  <div class="divider"></div>

  <div class="menu-preview">
    <div class="menu-chip"><strong>Zinger Burger</strong>550 rupees</div>
    <div class="menu-chip"><strong>Beef Shawarma</strong>400 rupees</div>
    <div class="menu-chip"><strong>Loaded Fries</strong>350 rupees</div>
    <div class="menu-chip"><strong>Student Deal</strong>750 rupees</div>
  </div>
</div>

<div class="footer">Fifth Avenue © 2025 — Powered by AI</div>

<script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.js"></script>
<script>
  const ASSISTANT_ID = "99cade8c-83dc-43bf-9980-23b6d27fc8b9";
  const PUBLIC_KEY   = "928f41b5-91fa-456e-bb3d-529c55c8290d"; // 🔑 replace this

  let vapi = null;
  let callActive = false;
  let callStarting = false;

  function initVapi() {
    vapi = new Vapi(PUBLIC_KEY);

    vapi.on("call-start", () => {
      callActive = true;
      callStarting = false;
      setUI("active");
    });

    vapi.on("call-end", () => {
      callActive = false;
      callStarting = false;
      setUI("idle");
    });

    vapi.on("speech-start", () => {
      document.getElementById("waves").classList.add("visible");
    });

    vapi.on("speech-end", () => {
      document.getElementById("waves").classList.remove("visible");
    });

    vapi.on("error", (e) => {
      console.error(e);
      callActive = false;
      callStarting = false;
      setUI("idle");
      document.getElementById("statusText").textContent = "Kuch masla aaya, dobara try karein";
    });
  }

  function setUI(state) {
    const btn   = document.getElementById("talkBtn");
    const label = document.getElementById("btnLabel");
    const status= document.getElementById("statusText");
    const dot   = document.getElementById("dot");
    const waves = document.getElementById("waves");

    btn.className = "talk-btn";
    dot.className = "online-dot";
    waves.classList.remove("visible");

    if (state === "idle") {
      label.textContent = "Ali se baat karein";
      btn.innerHTML = `<span class="icon">📞</span><span id="btnLabel">Ali se baat karein</span>`;
      status.textContent = "Online — Order lene ke liye tayyar hai";
      status.className = "status-text";
      dot.className = "online-dot";
    } else if (state === "calling") {
      btn.classList.add("calling");
      btn.innerHTML = `<span class="icon">⏳</span><span id="btnLabel">Connect ho raha hai...</span>`;
      status.textContent = "Thora wait karein...";
      status.className = "status-text";
      dot.classList.add("calling");
    } else if (state === "active") {
      btn.classList.add("active");
      btn.innerHTML = `<span class="icon">🔴</span><span id="btnLabel">Call khatam karein</span>`;
      status.textContent = "Ali sun raha hai — baat karein!";
      status.className = "status-text live";
      dot.classList.add("active");
      waves.classList.add("visible");
    }
  }

  async function toggleCall() {
    if (callStarting) return;

    if (callActive) {
      vapi.stop();
      return;
    }

    callStarting = true;
    setUI("calling");

    try {
      await vapi.start(ASSISTANT_ID);
    } catch (e) {
      console.error(e);
      callStarting = false;
      setUI("idle");
      document.getElementById("statusText").textContent = "Connect nahi ho saka, dobara try karein";
    }
  }

  initVapi();
</script>
</body>
</html>
